<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplEats – Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">SimplEats</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Startseite</a></li>
                <li class="nav-item"><a class="nav-link" href="rezepte.html">Rezepte</a></li>
                <li class="nav-item"><a class="nav-link" href="rezept-erstellen.html">Rezept hinzufügen</a></li>
                <li class="nav-item active"><a class="nav-link" href="login.html">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="registrierung.html">Registrieren</a></li>
            </ul>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-4">Login</h2>
                        <form>
                            <div class="form-group">
                                <label for="username">Benutzername</label>
                                <input type="text" class="form-control" id="username" placeholder="Dein Benutzername" required>
                            </div>
                            <div class="form-group">
                                <label for="password">Passwort</label>
                                <input type="password" class="form-control" id="password" placeholder="Dein Passwort" required>
                            </div>
                            <div class="form-group form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Angemeldet bleiben</label>
                            </div>
                            <button type="submit" class="btn btn-dark btn-block">Einloggen</button>
                        </form>
                        <hr>
                        <p class="text-center mb-0">
                            Noch kein Konto? <a href="registrierung.html">Jetzt registrieren</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <small>&copy; 2026 SimplEats</small>
    </footer>

</body>
</html>
