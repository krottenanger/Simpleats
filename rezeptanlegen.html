<body>

  <nav class="navbar navbar-dark navbar-expand-lg sticky-top border-bottom">
    <a class="navbar-brand ms-3" href="index.html"><img src="img/logo.png" alt="Logo" style="height: 40px; border-radius: 50%;"></a>

        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <h1>Neues Rezept erstellen</h1>
    <form id="rezept-formular">

      <div class="mb-3">
        <label for="titel" class="form-label">Titel *</label>
        <input type="text" class="form-control" id="titel" placeholder="z.B. Spaghetti Bolognese" required>
      </div>

      <div class="mb-3">
        <label for="bild" class="form-label">Bild</label>
        <input type="file" class="form-control" id="bild" accept="image/*">
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="kategorie" class="form-label">Kategorie</label>
          <select class="form-select" id="kategorie">
            <option value="">wählen</option>
            <option>Vorspeise</option>
            <option>Hauptgericht</option>
            <option>Dessert</option>
            <option>Snack</option>
          </select>
        </div>
        <div class="col-md-3 mb-3">
          <label for="schwierigkeit" class="form-label">Schwierigkeit</label>
          <select class="form-select" id="schwierigkeit">
            <option value="">wählen</option>
            <option>Einfach</option>
            <option>Mittel</option>
            <option>Schwer</option>
          </select>
        </div>
        <div class="col-md-3 mb-3">
          <label for="dauer" class="form-label">Dauer (Min.)</label>
          <input type="number" class="form-control" id="dauer" min="1" placeholder="30">
        </div>
      </div>

      <div class="mb-3">
        <label for="portionen" class="form-label">Portionen</label>
        <input type="number" class="form-control w-25" id="portionen" min="1" value="2">
      </div>

      <div class="mb-3">
        <label class="form-label">Zutaten *</label>
        <div class="input-group mb-2">
          <input type="text" class="form-control" placeholder="Menge (z.B. 200g)">
          <input type="text" class="form-control" placeholder="Zutat (z.B. Mehl)">
        </div>
        <div class="input-group mb-2">
          <input type="text" class="form-control" placeholder="Menge (z.B. 200g)">
          <input type="text" class="form-control" placeholder="Zutat (z.B. Mehl)">
        </div>
        <div class="input-group mb-2">
          <input type="text" class="form-control" placeholder="Menge (z.B. 200g)">
          <input type="text" class="form-control" placeholder="Zutat (z.B. Mehl)">
        </div>
        <div class="input-group mb-2">
          <input type="text" class="form-control" placeholder="Menge (z.B. 200g)">
          <input type="text" class="form-control" placeholder="Zutat (z.B. Mehl)">
        </div>
        <div class="input-group mb-2">
          <input type="text" class="form-control" placeholder="Menge (z.B. 200g)">
          <input type="text" class="form-control" placeholder="Zutat (z.B. Mehl)">
        </div>
      </div>

      <div class="mb-3">
        <label for="zubereitung" class="form-label">Zubereitung *</label>
        <textarea class="form-control" id="zubereitung" rows="6" placeholder="Schritt für Schritt beschreiben..." required></textarea>
      </div>

      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Rezept speichern</button>
        <button type="reset" class="btn btn-secondary">Zurücksetzen</button>
      </div>
    </form>
  </div>
