<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark navbar-expand-lg sticky-top border-bottom">
      <a class="navbar-brand ms-3" href="index.html"><img src="img/logo.png" alt="Logo" style="height: 40px; border-radius: 50%;"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="nav nav-pills ms-auto">
          <li class="nav-item">
            <a class="nav-link fw-bold" href="rezepte.html">Rezepte</a>
          </li>
          <li class="nav-item">
            <a class="nav-link fw-bold" href="rezeptanlegen.html">Rezept anlegen</a>
          </li>
          <li class="nav-item">
            <a class="nav-link fw-bold" href="registrierung.html">Registrieren</a>
          </li>
          <li class="nav-item">
            <a class="nav-link fw-bold" href="anmeldung.html">Login</a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 124px)">

        <div class="card login-card">
            <div class="card-body p-4">
                <h1 class="card-title text-center h4">Simpleats</h1>

                <form action="#" method="post">
                    <div class="mb-3">
                        <label for="benutzername" class="form-label">Benutzername</label>
                        <input type="text" class="form-control" id="benutzername" name="benutzername" placeholder="Benutzername" required>
                    </div>

                    <div class="mb-3">
                        <label for="passwort" class="form-label">Passwort</label>
                        <input type="password" class="form-control" id="passwort" name="passwort" placeholder="Passwort" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Anmelden</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">Noch kein Konto?
                        <a href="registrierung.html" class="text-decoration-none" style="color: var(--primary); font-size: 12px;">Jetzt registrieren</a>
                    </small>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-5 py-3">
      <div class="container text-center">
        <span class="me-3">&copy; 2026 Simpleats</span>
        <a href="datenschutz.html" class="me-3">Datenschutz</a>
        <a href="impressum.html">Impressum</a>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
